<!DOCTYPE html>
<html lang="es" class="antialiased">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alana AI - Iniciar Sesión</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/light/style.css" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            primary: {
              DEFAULT: '#8A5A9E',
              hover: '#7A4A8E',
              soft: '#F4F0F6',
              darkSoft: '#2D2034',
              text: '#6A3A7E'
            },
            dark: {
              bg: '#121212',
              surface: '#1E1E1E',
              border: '#2A2A2A',
              text: '#E0E0E0',
              muted: '#888888'
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .bg-pattern {
      background-image: radial-gradient(circle at 2px 2px, rgba(138, 90, 158, 0.08) 1px, transparent 0);
      background-size: 24px 24px;
    }
    .dark .bg-pattern {
      background-image: radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.03) 1px, transparent 0);
    }
  </style>
</head>
<body class="bg-[#fafafa] dark:bg-dark-bg text-gray-800 dark:text-gray-200 transition-colors duration-200 min-h-screen flex items-center justify-center relative bg-pattern">
  
  <!-- Theme Toggle (Absolute top right) -->
  <button onclick="document.documentElement.classList.toggle('dark')" class="absolute top-6 right-6 p-3 bg-white dark:bg-dark-surface border border-gray-200 dark:border-dark-border rounded-xl text-gray-500 dark:text-gray-400 hover:text-primary transition-colors shadow-sm">
    <i class="ph-light ph-moon text-xl dark:hidden"></i>
    <i class="ph-light ph-sun text-xl hidden dark:block"></i>
  </button>

  <div class="w-full max-w-[440px] px-6">
    <!-- Logo area -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary-soft dark:bg-primary-darkSoft mb-6 shadow-inner border border-white/50 dark:border-black/20">
        <i class="ph-light ph-magic-wand text-3xl text-primary"></i>
      </div>
      <h1 class="text-3xl font-semibold text-gray-900 dark:text-white mb-2">Alana AI</h1>
      <p class="text-gray-500 dark:text-dark-muted font-light">Quoting OS para Agentes de Viaje</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white dark:bg-dark-surface border border-gray-100 dark:border-dark-border rounded-3xl p-8 shadow-sm">
      <form action="workspace.html" method="GET">
        <div class="space-y-5">
          
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Correo electrónico</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                <i class="ph-light ph-envelope-simple text-gray-400 text-lg"></i>
              </div>
              <input type="email" id="email" name="email" value="victor@alanatours.com" class="block w-full pl-10 pr-4 py-3 bg-gray-50 dark:bg-[#1a1a1a] border border-gray-200 dark:border-dark-border rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary dark:focus:border-primary text-gray-800 dark:text-white transition-colors" placeholder="tu@agencia.com" required>
            </div>
          </div>

          <div>
            <div class="flex items-center justify-between mb-1.5">
              <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Contraseña</label>
              <a href="#" class="text-[13px] font-medium text-primary hover:text-primary-hover transition-colors">¿Olvidaste tu contraseña?</a>
            </div>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                <i class="ph-light ph-lock-key text-gray-400 text-lg"></i>
              </div>
              <input type="password" id="password" name="password" value="123456@Aa7" class="block w-full pl-10 pr-10 py-3 bg-gray-50 dark:bg-[#1a1a1a] border border-gray-200 dark:border-dark-border rounded-xl focus:ring-2 focus:ring-primary/20 focus:border-primary dark:focus:border-primary text-gray-800 dark:text-white transition-colors" placeholder="••••••••" required>
              <button type="button" class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">
                <i class="ph-light ph-eye text-lg"></i>
              </button>
            </div>
          </div>

          <div class="flex items-center mt-4">
            <input id="remember" name="remember" type="checkbox" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded cursor-pointer accent-primary">
            <label for="remember" class="ml-2 block text-sm text-gray-600 dark:text-gray-400 cursor-pointer">
              Mantener la sesión iniciada
            </label>
          </div>

          <button type="submit" class="w-full bg-primary hover:bg-primary-hover text-white py-3 px-4 rounded-xl text-[15px] font-medium transition-all shadow-sm mt-8 flex justify-center items-center gap-2 group">
            Ingresar al Workspace
            <i class="ph-light ph-arrow-right text-lg group-hover:translate-x-1 transition-transform"></i>
          </button>
          
        </div>
      </form>
    </div>

    <!-- Footer link -->
    <div class="text-center mt-8">
      <p class="text-sm text-gray-500 dark:text-dark-muted font-light">
        ¿No tienes una cuenta? <a href="#" class="font-medium text-gray-700 dark:text-gray-300 hover:text-primary dark:hover:text-primary transition-colors">Solicita acceso</a>
      </p>
    </div>
  </div>

</body>
</html>
